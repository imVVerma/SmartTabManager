<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { width: 380px; min-height: 300px; background: #fff; color: #111; }

    .header { padding: 14px 16px 10px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    #search { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
    #search:focus { border-color: #888; }

    #tab-count { font-size: 12px; color: #888; padding: 8px 16px 4px; }

    #tab-list { max-height: 320px; overflow-y: auto; padding: 4px 0; }

    .tab-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; }
    .tab-item:hover { background: #f5f5f5; }
    .tab-item img { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-info { flex: 1; overflow: hidden; }
    .tab-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-url { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .close-btn { font-size: 16px; color: #bbb; cursor: pointer; padding: 0 4px; flex-shrink: 0; line-height: 1; }
    .close-btn:hover { color: #e00; }

    .footer { padding: 10px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; }
    .btn { flex: 1; padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #111; color: #fff; border-color: #111; }
    .btn-primary:hover { background: #333; }
    .session-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; gap: 10px; }
    .session-name { font-size: 13px; font-weight: 600; }
    .session-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .session-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm { padding: 5px 10px; font-size: 12px; flex: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Manager</h1>
    <input id="search" type="text" placeholder="Search tabs..." />
  </div>
  <div id="tab-count"></div>
  <div id="tab-list"></div>
  <div id="save-bar" style="display:none; padding: 10px 16px; border-top: 1px solid #eee; gap: 8px; align-items: center;">
  <input id="session-name" type="text" placeholder="Session name..." style="flex:1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none;" />
  <button class="btn btn-primary" id="confirm-save" style="flex:none; padding: 7px 12px;">Save</button>
  <button class="btn" id="cancel-save" style="flex:none; padding: 7px 12px;">✕</button>
</div>
  <div class="footer">
  <button class="btn btn-primary" id="save-session">Save session</button>
  <button class="btn" id="group-tabs">Group tabs</button>
  <button class="btn" id="view-sessions">Sessions</button>
</div>
  <script src="popup.js"></script>
</body>
</html>
